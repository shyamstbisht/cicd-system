name: Build CICD

on:
  push:
    paths:
      - 'practice1/**'
    branches:
      - dev

jobs:
  build:
    runs-on: self-hosted
  
    defaults:
      run:
        working-directory: practice1

    steps:
    - name: Git Checkout
      uses: actions/checkout@v4

    - name: List project files
      run: ls -la
    
    - name: Docker login
      run: echo ${{ secrets.DOCKER_TOKEN }} | docker login -u ${{ vars.DOCKER_USERNAME }} --password-stdin

    - name: Build docker image and push
      run: |
        docker build -t ${{ vars.DOCKER_USERNAME }}/deploy-practice-1:${{ github.sha }} \
                     -t ${{ vars.DOCKER_USERNAME }}/deploy-practice-1 .
        docker push ${{ vars.DOCKER_USERNAME }}/deploy-practice-1:${{ github.sha }}
        docker push ${{ vars.DOCKER_USERNAME }}/deploy-practice-1:latest

  deploy:
    runs-on: self-hosted
    needs: build

    defaults:
      run:
        working-directory: practice1
    
    steps:
    - name: Git checkout
      uses: actions/checkout@v4

    - name: setup kube config
      run: |
        mkdir -p ~/.kube
        echo "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config
        chmod 600 ~/.kube/config
    
    - name: Deploy K8s manifest files
      run: |
        kubectl apply -f k8s/deployment.yaml --namespace dev
        kubectl apply -f k8s/service.yaml --namespace dev

    - name: Check K8s deployment status
      run: kubectl rollout status deployment/deploy-practice-1 --namespace dev

    - name: Validate deployment
      run: curl --fail http://localhost:30010

