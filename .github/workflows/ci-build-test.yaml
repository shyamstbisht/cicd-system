name: CI Pipeline - Build and Test

on:
  push: 
    paths:
      - '02-ci-build-and-test/**'
    branches:
      - main
      - dev

jobs:
  build-test:
    runs-on: self-hosted

    defaults:
      run:
        working-directory: 02-ci-build-and-test
    
    steps:
      - name: checkout code
        uses: actions/checkout@v4
    
      - name: Build Docker Image
        run: docker build -t cicd-prod .
      
      - name: Run Container
        run: docker run -d -p 5000:5000 --name prod-container cicd-prod
      
      - name: Wait for app
        run: sleep 5
      
      - name: Fake test
        run: echo "all test passed successfully"
